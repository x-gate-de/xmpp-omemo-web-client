<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>{% block title %}Chat{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css?v={{ asset_ver }}">
<script src="/static/theme.js?v={{ asset_ver }}"></script>
<link rel="manifest" href="/static/manifest.webmanifest">
<meta name="theme-color" content="#2563eb">
<link rel="apple-touch-icon" href="/static/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chat">
<meta name="mobile-web-app-capable" content="yes">
</head>
<body>
<header class="appbar">
  <div class="appbar-inner">
    <a class="brand" href="/" aria-label="Chat Startseite">
      <svg class="brand-ic" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5z"/></svg>
      <span>Chat</span>
    </a>
    <nav class="tabs" aria-label="Hauptnavigation">
      <a href="/" class="tab {% if nav_active == 'archiv' %}active{% endif %}">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Chats</span>
      </a>
      <a href="/contacts" class="tab {% if nav_active == 'kontakte' %}active{% endif %}">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Kontakte</span>
      </a>
      <a href="/rooms" class="tab {% if nav_active == 'raeume' %}active{% endif %}">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
        <span>Raeume</span>
      </a>
    </nav>
    <a class="iconbtn" href="/search" title="Suche" aria-label="Im Archiv suchen">
      <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </a>
    <details class="design-menu">
      <summary class="design-btn" title="Design" aria-label="Design waehlen">
        <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="10.5" r="2.5"/><circle cx="8.5" cy="7.5" r="2.5"/><circle cx="6.5" cy="12.5" r="2.5"/><path d="M12 2a10 10 0 0 0 0 20 2 2 0 0 0 2-2 2 2 0 0 1 2-2h1a4 4 0 0 0 4-4 8 8 0 0 0-9-12z"/></svg>
      </summary>
      <div class="design-panel">
        <div class="design-row">
          <span class="design-label">Modus</span>
          <div class="design-opts">
            <button type="button" class="design-mode" data-theme-set="auto">Auto</button>
            <button type="button" class="design-mode" data-theme-set="light">Hell</button>
            <button type="button" class="design-mode" data-theme-set="dark">Dunkel</button>
          </div>
        </div>
        <div class="design-row">
          <span class="design-label">Farbe</span>
          <div class="design-opts">
            <button type="button" class="swatch" data-accent-set="blue" style="--sw:#2563eb" title="Blau" aria-label="Blau"></button>
            <button type="button" class="swatch" data-accent-set="green" style="--sw:#059669" title="Gruen" aria-label="Gruen"></button>
            <button type="button" class="swatch" data-accent-set="red" style="--sw:#dc2626" title="Rot" aria-label="Rot"></button>
            <button type="button" class="swatch" data-accent-set="purple" style="--sw:#7c3aed" title="Violett" aria-label="Violett"></button>
            <button type="button" class="swatch" data-accent-set="orange" style="--sw:#ea580c" title="Orange" aria-label="Orange"></button>
            <button type="button" class="swatch" data-accent-set="teal" style="--sw:#0d9488" title="Tuerkis" aria-label="Tuerkis"></button>
          </div>
        </div>
        <div class="design-row">
          <span class="design-label">Dichte</span>
          <div class="design-opts">
            <button type="button" class="design-mode" data-density-set="comfortable">Komfort</button>
            <button type="button" class="design-mode" data-density-set="compact">Kompakt</button>
          </div>
        </div>
        <div class="design-row">
          <span class="design-label">Ansicht</span>
          <div class="design-opts">
            <button type="button" class="design-mode" data-view-set="list">Liste</button>
            <button type="button" class="design-mode" data-view-set="grid">Raster</button>
          </div>
        </div>
        <div class="design-row" data-grid-only>
          <span class="design-label">Spalten</span>
          <div class="design-opts">
            <button type="button" class="design-mode" data-cols-set="auto">Auto</button>
            <button type="button" class="design-mode" data-cols-set="2">2</button>
            <button type="button" class="design-mode" data-cols-set="3">3</button>
            <button type="button" class="design-mode" data-cols-set="4">4</button>
          </div>
        </div>
        <div class="design-row" data-grid-only>
          <span class="design-label">Zeilen (Chats)</span>
          <div class="design-opts">
            <button type="button" class="design-mode" data-lines-set="3">3</button>
            <button type="button" class="design-mode" data-lines-set="4">4</button>
            <button type="button" class="design-mode" data-lines-set="6">6</button>
            <button type="button" class="design-mode" data-lines-set="8">8</button>
          </div>
        </div>
        <div class="design-row">
          <span class="design-label">Sortierung (Chats)</span>
          <div class="design-opts">
            <button type="button" class="design-mode" data-sort-set="activity">Aktivitaet</button>
            <button type="button" class="design-mode" data-sort-set="unread">Ungelesen</button>
            <button type="button" class="design-mode" data-sort-set="name">Name</button>
          </div>
        </div>
        <div class="design-foot">
          <a class="ver-link" href="{{ changelog_url }}" target="_blank" rel="noopener">X-Chat {{ app_version }}</a>
        </div>
      </div>
    </details>
    {% if account_jid %}
    {% if account_state %}
    <form class="online-form" method="post" action="/account/online" id="online-form">
      <input type="hidden" name="value" id="online-value" value="{{ account_state.next }}">
      <button class="online-btn {{ account_state.cls }}" id="online-btn" type="submit"
              title="Immer-online umschalten (Archivierung laeuft im Hintergrund weiter)">
        <span class="dot"></span>
        <span id="online-label">{{ account_state.label }}</span>
      </button>
    </form>
    {% endif %}
    <form class="logout-form" method="post" action="/logout">
      <button class="logout-btn" type="submit" title="Abmelden ({{ account_jid }})">
        <span class="who-jid">{{ account_jid }}</span>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </form>
    {% endif %}
  </div>
</header>
<main class="main">{% block content %}{% endblock %}</main>
{% block scripts %}{% endblock %}
</body>
</html>
