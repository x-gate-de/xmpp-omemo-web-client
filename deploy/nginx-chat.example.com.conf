# Datei: deploy/nginx-chat.example.com.conf
# Autor: Torben Belz
# Version: 1.0.0
# Lizenz: AGPL-3.0-or-later (siehe LICENSE)
# Zweck:
# - nginx-Reverse-Proxy fuer die Chat Web-UI (uvicorn auf 127.0.0.1:8080).
# Betriebs- und Wartungshinweise:
# - Extern: traefik terminiert TLS und routet auf <server-ip>:80.
# - :443 mit eigenem Let's-Encrypt-Zert fuer direkten internen HTTPS-Zugriff.
# - ACME-Challenge bleibt fuer die Zertifikatserneuerung erreichbar.
# -----------------------------------------------------------------------------

server {
    server_name chat.example.com;
    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate /etc/letsencrypt/live/chat.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; base-uri 'none'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name chat.example.com;

    # Fuer Let's-Encrypt HTTP-01 (Zertifikatserneuerung).
    location ~ ^/.well-known/acme-challenge/ {
        root /var/www/chat.example.com;
        allow all;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
